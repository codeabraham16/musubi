<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="'SF Mono','Cascadia Code',Menlo,Consolas,monospace" role="img" aria-label="Musubi — servidor MCP de memoria persistente: Claude Code, daemon Go y SQLite local-first">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="470" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="469" rx="14" fill="none" stroke="#1c2333" stroke-width="1"/>

  <!-- ============ HEADER ============ -->
  <g transform="translate(48,40)">
    <!-- logo: nudo / enlace -->
    <g filter="url(#glow)">
      <path d="M6 30 L24 4 L42 30 Z" fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="24" cy="22" r="5" fill="url(#logoGrad)"/>
    </g>
    <text x="60" y="20" font-size="30" font-weight="700" letter-spacing="3" fill="#e6edf3">MUSUBI</text>
    <text x="218" y="20" font-size="14" letter-spacing="2" fill="#7d8590">· MCP MEMORY</text>
    <text x="61" y="42" font-size="13" letter-spacing="0.5" fill="#7d8590">memoria persistente para agentes de IA · local-first · model-free</text>
  </g>

  <!-- badges -->
  <g transform="translate(0,42)" font-size="11" letter-spacing="1" font-weight="600">
    <g transform="translate(778,0)"><rect width="78" height="22" rx="11" fill="#0e2a26" stroke="#2dd4bf" stroke-opacity="0.5"/><text x="39" y="15" text-anchor="middle" fill="#2dd4bf">GO 1.26</text></g>
    <g transform="translate(864,0)"><rect width="74" height="22" rx="11" fill="#241a33" stroke="#a78bfa" stroke-opacity="0.5"/><text x="37" y="15" text-anchor="middle" fill="#a78bfa">SQLITE</text></g>
    <g transform="translate(946,0)"><rect width="62" height="22" rx="11" fill="#0e2a26" stroke="#4ade80" stroke-opacity="0.5"/><text x="31" y="15" text-anchor="middle" fill="#4ade80">MCP</text></g>
    <g transform="translate(1016,0)"><rect width="68" height="22" rx="11" fill="#161b22" stroke="#444c56"/><text x="34" y="15" text-anchor="middle" fill="#adbac7">v0.11.0</text></g>
    <g transform="translate(1092,0)"><rect width="60" height="22" rx="11" fill="#161b22" stroke="#444c56"/><text x="30" y="15" text-anchor="middle" fill="#adbac7">MIT</text></g>
  </g>

  <line x1="48" y1="108" x2="1152" y2="108" stroke="url(#rule)" stroke-width="1"/>
  <text x="48" y="133" font-size="11" letter-spacing="2" fill="#56607a">// ARQUITECTURA · 3 CAPAS · CERO SERVICIOS OBLIGATORIOS · LOS EMBEDDINGS SON OPCIONALES</text>

  <!-- ============ CONECTORES (data flow animado) ============ -->
  <g stroke-width="1.5" fill="none">
    <path id="c1" d="M398 250 L443 250" stroke="#2dd4bf" stroke-opacity="0.35"/>
    <path id="c2" d="M783 250 L828 250" stroke="#a78bfa" stroke-opacity="0.35"/>
  </g>
  <text x="400" y="242" font-size="9" letter-spacing="1" fill="#56607a">hooks · jsonrpc</text>
  <text x="786" y="242" font-size="9" letter-spacing="1" fill="#56607a">save · recall</text>
  <!-- paquetes que viajan -->
  <circle r="3" fill="#2dd4bf"><animateMotion dur="2.2s" repeatCount="indefinite" path="M398 250 L443 250"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#2dd4bf"><animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M398 250 L443 250"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#a78bfa"><animateMotion dur="2.2s" begin="0.6s" repeatCount="indefinite" path="M783 250 L828 250"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="0.6s" repeatCount="indefinite"/></circle>
  <circle r="3" fill="#4ade80"><animateMotion dur="2.2s" begin="1.7s" repeatCount="indefinite" path="M828 250 L783 250"/><animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="1.7s" repeatCount="indefinite"/></circle>

  <!-- ============ PANEL 1 · CLAUDE CODE ============ -->
  <g transform="translate(48,158)">
    <rect width="350" height="184" rx="8" fill="#0d1422" stroke="#2dd4bf" stroke-opacity="0.45"/>
    <rect width="350" height="28" rx="8" fill="#2dd4bf" fill-opacity="0.07"/>
    <circle cx="16" cy="14" r="4" fill="#2dd4bf"/>
    <text x="30" y="18" font-size="13" font-weight="700" letter-spacing="1.5" fill="#2dd4bf">CLAUDE CODE</text>
    <text x="334" y="18" text-anchor="end" font-size="10" fill="#56607a">hooks</text>
    <text x="20" y="54" font-size="10" letter-spacing="1" fill="#56607a">HOOKS</text>
    <text x="20" y="74" font-size="12" fill="#adbac7">SessionStart<tspan x="185" fill="#4ade80">→ detect</tspan></text>
    <text x="20" y="94" font-size="12" fill="#adbac7">UserPromptSubmit<tspan x="185" fill="#4ade80">→ turn</tspan></text>
    <text x="20" y="114" font-size="12" fill="#adbac7">PreToolUse(Read)<tspan x="185" fill="#4ade80">→ precheck</tspan></text>
    <text x="20" y="144" font-size="10" letter-spacing="1" fill="#56607a">INYECTA</text>
    <text x="20" y="164" font-size="12" fill="#768390">contexto por turno (delta) + gist</text>
  </g>

  <!-- ============ PANEL 2 · MUSUBI MCP ============ -->
  <g transform="translate(433,158)">
    <rect width="350" height="184" rx="8" fill="#120e22" stroke="#a78bfa" stroke-opacity="0.5"/>
    <rect width="350" height="28" rx="8" fill="#a78bfa" fill-opacity="0.08"/>
    <circle cx="16" cy="14" r="4" fill="#a78bfa"/>
    <text x="30" y="18" font-size="13" font-weight="700" letter-spacing="1.5" fill="#a78bfa">MUSUBI · DAEMON</text>
    <text x="334" y="18" text-anchor="end" font-size="10" fill="#56607a">go</text>
    <text x="20" y="54" font-size="10" letter-spacing="1" fill="#56607a">PROTOCOLO</text>
    <text x="20" y="74" font-size="12" fill="#adbac7">JSON-RPC 2.0 sobre stdio</text>
    <text x="20" y="94" font-size="12" fill="#adbac7">24 tools · panic-recovery · timeouts</text>
    <text x="20" y="124" font-size="10" letter-spacing="1" fill="#56607a">COGNICIÓN (model-free)</text>
    <text x="20" y="144" font-size="12" fill="#768390">resolver de skills · eficiencia tokens</text>
    <text x="20" y="164" font-size="12" fill="#768390">conflictos · grafo · multi-agente</text>
  </g>

  <!-- ============ PANEL 3 · SQLITE ============ -->
  <g transform="translate(818,158)">
    <rect width="350" height="184" rx="8" fill="#0d1422" stroke="#4ade80" stroke-opacity="0.45"/>
    <rect width="350" height="28" rx="8" fill="#4ade80" fill-opacity="0.07"/>
    <circle cx="16" cy="14" r="4" fill="#4ade80"/>
    <text x="30" y="18" font-size="13" font-weight="700" letter-spacing="1.5" fill="#4ade80">SQLITE</text>
    <text x="334" y="18" text-anchor="end" font-size="10" fill="#56607a">local-first · puro-go</text>
    <text x="20" y="54" font-size="10" letter-spacing="1" fill="#56607a">MEMORIA</text>
    <text x="20" y="74" font-size="12" fill="#adbac7">observaciones + FTS5</text>
    <text x="20" y="94" font-size="12" fill="#adbac7">embeddings: <tspan fill="#2dd4bf">Ollama</tspan> / <tspan fill="#2dd4bf">OpenAI</tspan></text>
    <text x="20" y="124" font-size="10" letter-spacing="1" fill="#56607a">ESTRUCTURA</text>
    <text x="20" y="144" font-size="12" fill="#768390">grafo de entidades · telemetría</text>
    <text x="20" y="164" font-size="12" fill="#768390">decay + consolidación automáticos</text>
  </g>

  <!-- ============ FLUJOS ============ -->
  <text x="48" y="372" font-size="11" letter-spacing="2" fill="#56607a">// EL CONTEXTO QUE ENTRA AL AGENTE SE MIDE Y SE MINIMIZA — SOLO EL DELTA NUEVO POR TURNO</text>

  <!-- ============ FOOTER STATS ============ -->
  <line x1="48" y1="392" x2="1152" y2="392" stroke="#1c2333" stroke-width="1"/>
  <g transform="translate(48,420)" font-size="11" letter-spacing="1" fill="#768390">
    <text x="0" y="0"><tspan fill="#e6edf3" font-weight="700">19 640</tspan> LOC</text>
    <text x="120" y="0"><tspan fill="#e6edf3" font-weight="700">11</tspan> PAQUETES</text>
    <text x="240" y="0"><tspan fill="#e6edf3" font-weight="700">24</tspan> TOOLS MCP</text>
    <text x="380" y="0"><tspan fill="#e6edf3" font-weight="700">~70%</tspan> COBERTURA</text>
    <text x="530" y="0"><tspan fill="#e6edf3" font-weight="700">0</tspan> PANICS</text>
    <text x="620" y="0">CI <tspan fill="#4ade80">-race</tspan></text>
    <text x="1104" y="0" text-anchor="end" fill="#56607a">codeabraham16 / musubi</text>
  </g>

  <!-- pulso sutil del logo central -->
  <circle cx="608" cy="172" r="4" fill="#a78bfa" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;9;4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>

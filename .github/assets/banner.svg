<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="'SF Mono','Cascadia Code',Menlo,Consolas,monospace" role="img" aria-label="Musubi — 結び, atar la memoria entre sesiones: Claude Code, daemon Go y SQLite local-first">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0.6"/>
    </linearGradient>
    <!-- gradiente que FLUYE por el cordón del nudo (la memoria viajando por el lazo) -->
    <linearGradient id="cordFlow" gradientUnits="userSpaceOnUse" spreadMethod="repeat" x1="52" y1="40" x2="76" y2="64">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.33" stop-color="#a78bfa"/>
      <stop offset="0.66" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#2dd4bf"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="24 24" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="470" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="469" rx="14" fill="none" stroke="#1c2333" stroke-width="1"/>

  <!-- ============ MARCA DE AGUA · el nudo que todo lo ata (gira muy lento) ============ -->
  <g opacity="0.05" filter="url(#soft)">
    <g>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" values="0 600 250;360 600 250" dur="160s" repeatCount="indefinite"/>
      <path d="M 600.0,220.0 L 609.8,220.4 L 619.4,221.8 L 628.8,224.0 L 637.8,227.0 L 646.2,230.8 L 653.9,235.3 L 660.9,240.4 L 667.0,246.0 L 672.1,252.0 L 676.2,258.3 L 679.3,264.7 L 681.2,271.2 L 682.0,277.6 L 681.8,283.8 L 680.4,289.6 L 677.9,295.0 L 674.5,299.8 L 670.1,303.9 L 664.9,307.2 L 659.0,309.7 L 652.4,311.3 L 645.3,311.9 L 637.8,311.4 L 630.0,310.0 L 622.1,307.5 L 614.2,304.0 L 606.5,299.6 L 599.0,294.2 L 591.9,288.0 L 585.3,280.9 L 579.3,273.3 L 574.0,265.0 L 569.5,256.3 L 565.8,247.3 L 563.1,238.1 L 561.2,228.8 L 560.3,219.6 L 560.3,210.7 L 561.2,202.1 L 563.0,194.0 L 565.7,186.6 L 569.1,179.9 L 573.1,174.0 L 577.8,169.1 L 582.9,165.1 L 588.4,162.3 L 594.1,160.6 L 600.0,160.0 L 605.9,160.6 L 611.6,162.3 L 617.1,165.1 L 622.2,169.1 L 626.9,174.0 L 630.9,179.9 L 634.3,186.6 L 637.0,194.0 L 638.8,202.1 L 639.7,210.7 L 639.7,219.6 L 638.8,228.8 L 636.9,238.1 L 634.2,247.3 L 630.5,256.3 L 626.0,265.0 L 620.7,273.3 L 614.7,280.9 L 608.1,288.0 L 601.0,294.2 L 593.5,299.6 L 585.8,304.0 L 577.9,307.5 L 570.0,310.0 L 562.2,311.4 L 554.7,311.9 L 547.6,311.3 L 541.0,309.7 L 535.1,307.2 L 529.9,303.9 L 525.5,299.8 L 522.1,295.0 L 519.6,289.6 L 518.2,283.8 L 518.0,277.6 L 518.8,271.2 L 520.7,264.7 L 523.8,258.3 L 527.9,252.0 L 533.0,246.0 L 539.1,240.4 L 546.1,235.3 L 553.8,230.8 L 562.2,227.0 L 571.2,224.0 L 580.6,221.8 L 590.2,220.4 L 600.0,220.0 Z"
            fill="none" stroke="url(#logoGrad)" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
  </g>


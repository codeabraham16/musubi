<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="'SF Mono','Cascadia Code',Menlo,Consolas,monospace" role="img" aria-label="Musubi — 結び: el código se anuda en memoria. Servidor MCP local-first en Go.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#0d1320"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <!-- gradiente que FLUYE por el cordón del nudo (la memoria viajando por el lazo) -->
    <linearGradient id="cordFlow" gradientUnits="userSpaceOnUse" spreadMethod="repeat" x1="200" y1="116" x2="240" y2="156">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.33" stop-color="#a78bfa"/>
      <stop offset="0.66" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#2dd4bf"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="40 40" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="470" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="469" rx="14" fill="none" stroke="#1c2333" stroke-width="1"/>

  <!-- ============================ DERECHA · VENTANA DE CÓDIGO ============================ -->
  <!-- cuerpo -->
  <rect x="472" y="72" width="680" height="326" rx="12" fill="#090d15" stroke="#1c2333" stroke-width="1"/>
  <!-- barra de título (solo esquinas superiores redondeadas) -->
  <path d="M472,108 L472,84 Q472,72 484,72 L1140,72 Q1152,72 1152,84 L1152,108 Z" fill="#10151e"/>
  <line x1="472" y1="108" x2="1152" y2="108" stroke="#1c2333" stroke-width="1"/>
  <circle cx="492" cy="90" r="4" fill="#2dd4bf"/>
  <circle cx="508" cy="90" r="4" fill="#a78bfa"/>
  <circle cx="524" cy="90" r="4" fill="#4ade80"/>
  <text x="548" y="94" font-size="12" letter-spacing="0.5" fill="#768390">memory/recall.go</text>
  <text x="1136" y="94" text-anchor="end" font-size="11" letter-spacing="1" fill="#56607a">go · MCP</text>

  <!-- canaleta de números -->
  <line x1="520" y1="120" x2="520" y2="388" stroke="#141a25" stroke-width="1"/>
  <g font-size="11.5" fill="#39414f" text-anchor="end">
    <text x="510" y="136">1</text>
    <text x="510" y="158">2</text>
    <text x="510" y="180">3</text>
    <text x="510" y="202">4</text>
    <text x="510" y="224">5</text>
    <text x="510" y="246">6</text>
    <text x="510" y="268">7</text>
    <text x="510" y="290">8</text>
    <text x="510" y="312">9</text>
    <text x="510" y="334">10</text>
    <text x="510" y="356">11</text>
    <text x="510" y="378">12</text>
  </g>

  <!-- código (resaltado) -->
  <g font-size="14.5" fill="#8b949e" xml:space="preserve">
    <text x="532" y="136"><tspan fill="#5b6b7a">// memory/recall.go — </tspan><tspan fill="#2dd4bf">結び</tspan></text>
    <text x="532" y="158"><tspan fill="#a78bfa">package</tspan> <tspan fill="#adbac7">memory</tspan></text>
    <text x="532" y="202"><tspan fill="#5b6b7a">// Recall trae lo relevante a q, ya rankeado.</tspan></text>
    <text x="532" y="224"><tspan fill="#5b6b7a">// local-first · FTS5 · los embeddings son opcionales.</tspan></text>
    <text x="532" y="246"><tspan fill="#a78bfa">func</tspan> (<tspan fill="#adbac7">s</tspan> <tspan fill="#2dd4bf">*Store</tspan>) <tspan fill="#7ee787">Recall</tspan>(<tspan fill="#adbac7">q</tspan> <tspan fill="#2dd4bf">string</tspan>, <tspan fill="#adbac7">k</tspan> <tspan fill="#2dd4bf">int</tspan>) []<tspan fill="#2dd4bf">Memory</tspan> {</text>
    <text x="532" y="268"><tspan fill="#adbac7">    hits</tspan> := <tspan fill="#adbac7">s</tspan>.<tspan fill="#adbac7">fts5</tspan>.<tspan fill="#7ee787">Search</tspan>(<tspan fill="#adbac7">q</tspan>)<tspan fill="#5b6b7a">          // léxico, sin modelo</tspan></text>
    <text x="532" y="290"><tspan fill="#adbac7">    </tspan><tspan fill="#a78bfa">if</tspan> <tspan fill="#adbac7">s</tspan>.<tspan fill="#adbac7">embed</tspan> != <tspan fill="#a78bfa">nil</tspan> {<tspan fill="#5b6b7a">             // ¿hay vectores? fusiona</tspan></text>
    <text x="532" y="312"><tspan fill="#adbac7">        hits</tspan> = <tspan fill="#7ee787">blend</tspan>(<tspan fill="#adbac7">hits</tspan>, <tspan fill="#adbac7">s</tspan>.<tspan fill="#adbac7">ann</tspan>.<tspan fill="#7ee787">Near</tspan>(<tspan fill="#adbac7">q</tspan>, <tspan fill="#adbac7">k</tspan>))</text>
    <text x="532" y="334"><tspan fill="#adbac7">    </tspan>}</text>
    <text x="532" y="356"><tspan fill="#adbac7">    </tspan><tspan fill="#a78bfa">return</tspan> <tspan fill="#7ee787">rank</tspan>(<tspan fill="#adbac7">hits</tspan>).<tspan fill="#7ee787">TopK</tspan>(<tspan fill="#adbac7">k</tspan>)<tspan fill="#5b6b7a">        // decay + grafo + frescura</tspan></text>
    <text x="532" y="378">}</text>
  </g>
  <!-- cursor que parpadea (código vivo) -->
  <rect x="541" y="366" width="8" height="15" fill="#2dd4bf">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ============================ CORDÓN · el resultado se anuda en memoria ============================ -->
  <path id="tie" d="M 472 214 C 396 214 338 182 280 168" fill="none" stroke="#1c2333" stroke-width="2"/>
  <path d="M 472 214 C 396 214 338 182 280 168" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round" stroke-dasharray="4 12">
    <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <text x="404" y="206" font-size="9" letter-spacing="1" fill="#56607a">recall ⇝ se anuda</text>
  <!-- paquete que viaja del código al nudo -->
  <circle r="3" fill="#4ade80">
    <animateMotion dur="2.4s" repeatCount="indefinite" rotate="auto"
      path="M 472 214 C 396 214 338 182 280 168"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- ============================ IZQUIERDA · NUDO MUSUBI (結び) ============================ -->
  <g filter="url(#glow)">
    <path d="M 240.0,144.0 L 243.7,144.1 L 247.3,144.5 L 250.8,145.2 L 254.3,146.1 L 257.6,147.3 L 260.8,148.7 L 263.8,150.3 L 266.5,152.1 L 269.0,154.0 L 271.2,156.1 L 273.2,158.4 L 274.9,160.7 L 276.2,163.1 L 277.2,165.5 L 277.9,167.9 L 278.3,170.3 L 278.3,172.6 L 278.0,174.9 L 277.3,177.0 L 276.4,179.0 L 275.1,180.8 L 273.6,182.4 L 271.8,183.8 L 269.8,185.0 L 267.5,185.9 L 265.1,186.5 L 262.5,186.8 L 259.7,186.9 L 256.9,186.6 L 254.0,186.0 L 251.1,185.1 L 248.1,183.9 L 245.2,182.4 L 242.3,180.7 L 239.5,178.6 L 236.9,176.3 L 234.3,173.8 L 232.0,171.0 L 229.8,168.1 L 227.9,165.0 L 226.2,161.8 L 224.7,158.4 L 223.5,155.0 L 222.6,151.6 L 221.9,148.1 L 221.5,144.7 L 221.4,141.3 L 221.6,138.0 L 222.0,134.9 L 222.8,131.9 L 223.7,129.1 L 224.9,126.5 L 226.3,124.1 L 227.9,122.0 L 229.6,120.2 L 231.5,118.7 L 233.5,117.5 L 235.6,116.7 L 237.8,116.2 L 240.0,116.0 L 242.2,116.2 L 244.4,116.7 L 246.5,117.5 L 248.5,118.7 L 250.4,120.2 L 252.1,122.0 L 253.7,124.1 L 255.1,126.5 L 256.3,129.1 L 257.2,131.9 L 258.0,134.9 L 258.4,138.0 L 258.6,141.3 L 258.5,144.7 L 258.1,148.1 L 257.4,151.6 L 256.5,155.0 L 255.3,158.4 L 253.8,161.8 L 252.1,165.0 L 250.2,168.1 L 248.0,171.0 L 245.7,173.8 L 243.1,176.3 L 240.5,178.6 L 237.7,180.7 L 234.8,182.4 L 231.9,183.9 L 228.9,185.1 L 226.0,186.0 L 223.1,186.6 L 220.3,186.9 L 217.5,186.8 L 214.9,186.5 L 212.5,185.9 L 210.2,185.0 L 208.2,183.8 L 206.4,182.4 L 204.9,180.8 L 203.6,179.0 L 202.7,177.0 L 202.0,174.9 L 201.7,172.6 L 201.7,170.3 L 202.1,167.9 L 202.8,165.5 L 203.8,163.1 L 205.1,160.7 L 206.8,158.4 L 208.8,156.1 L 211.0,154.0 L 213.5,152.1 L 216.2,150.3 L 219.2,148.7 L 222.4,147.3 L 225.7,146.1 L 229.2,145.2 L 232.7,144.5 L 236.3,144.1 L 240.0,144.0 Z"
          pathLength="100" fill="none" stroke="url(#cordFlow)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="100" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" dur="1.9s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1" values="100;0"/>
    </path>
  </g>

  <!-- wordmark -->
  <text x="240" y="234" text-anchor="middle" font-size="32" font-weight="700" letter-spacing="6" fill="#e6edf3">MUSUBI</text>
  <text x="240" y="260" text-anchor="middle" font-size="16" font-weight="700" letter-spacing="6" fill="#2dd4bf">結び</text>
  <text x="240" y="286" text-anchor="middle" font-size="12" letter-spacing="0.5" fill="#7d8590">memoria persistente para agentes de IA</text>
  <text x="240" y="304" text-anchor="middle" font-size="12" letter-spacing="0.5" fill="#56607a">local-first · model-free</text>

  <!-- badges -->
  <g transform="translate(0,322)" font-size="10" letter-spacing="1" font-weight="600">
    <g transform="translate(86,0)"><rect width="62" height="20" rx="10" fill="#0e2a26" stroke="#2dd4bf" stroke-opacity="0.5"/><text x="31" y="14" text-anchor="middle" fill="#2dd4bf">GO 1.26</text></g>
    <g transform="translate(154,0)"><rect width="60" height="20" rx="10" fill="#241a33" stroke="#a78bfa" stroke-opacity="0.5"/><text x="30" y="14" text-anchor="middle" fill="#a78bfa">SQLITE</text></g>
    <g transform="translate(220,0)"><rect width="46" height="20" rx="10" fill="#0e2a26" stroke="#4ade80" stroke-opacity="0.5"/><text x="23" y="14" text-anchor="middle" fill="#4ade80">MCP</text></g>
    <g transform="translate(272,0)"><rect width="46" height="20" rx="10" fill="#161b22" stroke="#444c56"/><text x="23" y="14" text-anchor="middle" fill="#adbac7">MIT</text></g>
    <g transform="translate(324,0)"><rect width="62" height="20" rx="10" fill="#161b22" stroke="#444c56"/><text x="31" y="14" text-anchor="middle" fill="#adbac7">v0.50.0</text></g>
  </g>

  <!-- ============================ FOOTER ============================ -->
  <line x1="48" y1="416" x2="1152" y2="416" stroke="#1c2333" stroke-width="1"/>
  <text x="48" y="440" font-size="11" letter-spacing="1" fill="#56607a">// 結び — atar el contexto entre sesiones · solo el delta nuevo por turno</text>
  <text x="1152" y="440" text-anchor="end" font-size="11" letter-spacing="1" fill="#768390"><tspan fill="#e6edf3" font-weight="700">19 640</tspan> LOC · <tspan fill="#e6edf3" font-weight="700">27</tspan> tools · <tspan fill="#e6edf3" font-weight="700">0</tspan> panics · CI <tspan fill="#4ade80">-race</tspan></text>
</svg>

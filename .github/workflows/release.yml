name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64, asset: Musubi.exe }
          - { goos: windows, goarch: arm64, asset: Musubi-arm64.exe }
          - { goos: linux,   goarch: amd64, asset: musubi-linux-amd64 }
          - { goos: linux,   goarch: arm64, asset: musubi-linux-arm64 }
          - { goos: darwin,  goarch: amd64, asset: musubi-darwin-amd64 }
          - { goos: darwin,  goarch: arm64, asset: musubi-darwin-arm64 }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -o "${{ matrix.asset }}" ./cmd/musubi

      - name: Checksum (SHA-256)
        run: sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

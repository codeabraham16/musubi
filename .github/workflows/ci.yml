name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out

      - name: Coverage floor
        # Falla si la cobertura total cae por debajo del piso (ratchet anti-regresión).
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Cobertura total: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 70.0) { print "ERROR: cobertura " t "% < piso 70%"; exit 1 } }'

      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  test-cross:
    # Portabilidad (adopción por terceros, Track 16 F4): valida que el código COMPILA y los
    # tests pasan en Windows y macOS. El job `test` de ubuntu sigue siendo el canónico (race +
    # piso de cobertura + govulncheck); acá solo confirmamos que no hay nada POSIX-only. Sin
    # -race a propósito: evita depender de cgo/gcc en Windows (modernc/sqlite es Go puro, así
    # que build y test no necesitan un compilador C). Comandos `go` planos → corren igual en el
    # PowerShell default de windows-latest, sin `shell: bash`.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  bench-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Maintain complexity guard (memoria sub-cuadrática)
        # Corre BenchmarkMaintain a n=1k y n=10k y verifica que la MEMORIA asignada por
        # corrida no escale de forma cuadrática con el tamaño de la base. Medimos memoria
        # (B/op) y no tiempo a propósito: las asignaciones son deterministas y no dependen
        # del hardware ni del scheduler del runner, así que el guard es estable en CI
        # compartido (un guard por wall-time sería flaky). Antes de T7.1 el ratio
        # B/op(10k)/B/op(1k) era ~69x —el O(n²) del map de overlap en Consolidate—; tras
        # el fix denso es ~10x. Umbral 20: atrapa una regresión al patrón cuadrático sin
        # falsos positivos por ruido. (El fix asintótico de las postings de trigramas
        # —set-similarity-join— queda para T7.2; este guard protege lo ganado en T7.1.)
        run: |
          out=$(go test -run=NONE -bench='BenchmarkMaintain' -benchmem -benchtime=1x ./internal/memory/)
          echo "$out"
          b1=$(echo "$out" | awk '/Maintain\/n=1000-/ {for(i=1;i<=NF;i++) if($i=="B/op") print $(i-1)}')
          b10=$(echo "$out" | awk '/Maintain\/n=10000-/ {for(i=1;i<=NF;i++) if($i=="B/op") print $(i-1)}')
          echo "B/op n=1000:  ${b1:-<vacío>}"
          echo "B/op n=10000: ${b10:-<vacío>}"
          awk -v a="$b1" -v b="$b10" 'BEGIN {
            if (a+0 == 0 || b+0 == 0) { print "ERROR: no se pudo medir B/op de Maintain"; exit 1 }
            r = (b+0)/(a+0)
            printf "ratio B/op(10k)/B/op(1k) = %.1fx (umbral 20)\n", r
            if (r > 20.0) { print "ERROR: Maintain volvió a escalar cuadráticamente en memoria (regresión de T7.1)"; exit 1 }
            print "OK: Maintain escala sub-cuadráticamente en memoria"
          }'

      - name: Vector search sublinearity guard (IVF a escala)
        # Corre BenchmarkSearchVector a n=1k y n=10k (ambos con el IVF ENTRENADO, rebuild
        # síncrono en el bench) y verifica que la MEMORIA por búsqueda crezca SUB-LINEALmente
        # con el tamaño de la base: el IVF acota candidatos a ~nprobe·√n, así que
        # B/op(10k)/B/op(1k) ≈ √10 ≈ 3.2x (medido ~3.7x). Una regresión que rompa el IVF y
        # caiga a full-scan lo llevaría a ~lineal (~10x). Medimos B/op (determinista, estable en
        # runners compartidos), no wall-time (Track 16 F3.3). El caso de escala n=100000 es
        # opt-in (MUSUBI_BENCH_SCALE) y NO corre en CI por el costo de sembrar 100k filas.
        run: |
          out=$(go test -run=NONE -bench='BenchmarkSearchVector' -benchmem -benchtime=1x ./internal/memory/)
          echo "$out"
          b1=$(echo "$out" | awk '/SearchVector\/n=1000-/ {for(i=1;i<=NF;i++) if($i=="B/op") print $(i-1)}')
          b10=$(echo "$out" | awk '/SearchVector\/n=10000-/ {for(i=1;i<=NF;i++) if($i=="B/op") print $(i-1)}')
          echo "B/op n=1000:  ${b1:-<vacío>}"
          echo "B/op n=10000: ${b10:-<vacío>}"
          awk -v a="$b1" -v b="$b10" 'BEGIN {
            if (a+0 == 0 || b+0 == 0) { print "ERROR: no se pudo medir B/op de SearchVector"; exit 1 }
            r = (b+0)/(a+0)
            printf "ratio B/op(10k)/B/op(1k) = %.1fx (umbral 6)\n", r
            if (r > 6.0) { print "ERROR: la búsqueda vectorial dejó de escalar sublinealmente (¿IVF caído a full-scan?)"; exit 1 }
            print "OK: la búsqueda vectorial escala sublinealmente (IVF)"
          }'

  recall-gate:
    # Gate de CALIDAD del recall semántico (Track 17, T17.3c): corre la evaluación R@10 con la
    # tabla POTION multilingüe REAL sobre el fixture dorado versionado y asserta un piso
    # (ratchet anti-regresión: híbrido R@10 >= 0.80 y >= léxico). Antes esto sólo se logueaba y
    # se salteaba en CI. La tabla (~488MB, SHA-256 pinneado) se CACHEA entre corridas; sólo se
    # baja de HuggingFace en un cache miss, así que el costo recurrente es sólo cargarla y correr
    # la evaluación. MUSUBI_POTION_DIR debe ser ABSOLUTO: `go test` corre con el cwd en el dir del
    # paquete, no en la raíz del repo.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: Cache POTION table
        id: potion
        uses: actions/cache@v6
        with:
          path: .musubi/embeddings/potion-multilingual-128M
          key: potion-multilingual-128M-v1

      - name: Download POTION table (cache miss)
        if: steps.potion.outputs.cache-hit != 'true'
        # Checksum SHA-256 pinneado dentro de `embed pull` (PullModel): un mirror/host comprometido
        # no puede colar una tabla distinta.
        run: go run ./cmd/musubi embed pull --out "${{ github.workspace }}/.musubi/embeddings/potion-multilingual-128M"

      - name: Recall gate (R@10)
        env:
          MUSUBI_POTION_DIR: ${{ github.workspace }}/.musubi/embeddings/potion-multilingual-128M
        run: go test ./internal/recalleval/ -run TestSemanticVsLexicalReal -count=1 -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'

      - name: golangci-lint
        # Versión fijada (la verificada localmente); usa .golangci.yml del repo.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
